<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tableau de Bord — Admin Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ================================================================
       VARIABLES CSS — modifier ici pour changer le thème global
       ================================================================ */
    :root {
      /* Palette */
      --clr-primary:        #2563eb;
      --clr-primary-light:  rgba(37, 99, 235, 0.12);
      --clr-success:        #10b981;
      --clr-danger:         #ef4444;
      --clr-danger-light:   rgba(239, 68, 68, 0.10);
      --clr-warning:        #f59e0b;

      /* Sidebar */
      --sidebar-bg:         #0f172a;
      --sidebar-text:       #94a3b8;
      --sidebar-text-hover: #e2e8f0;
      --sidebar-active-bg:  rgba(37, 99, 235, 0.14);
      --sidebar-active-txt: #60a5fa;
      --sidebar-width:      240px;

      /* Layout */
      --clr-page-bg:        #f1f5f9;
      --clr-card-bg:        #ffffff;
      --clr-dark:           #0f172a;
      --clr-muted:          #64748b;
      --clr-border:         #e2e8f0;
      --clr-table-head-bg:  #f8fafc;

      --radius-sm: 6px;
      --radius:    10px;
      --radius-lg: 14px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.14);

      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --ease: 0.18s ease;
    }

    /* ================================================================
       RESET MINIMAL
       ================================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--clr-page-bg);
      color: var(--clr-dark);
      min-height: 100vh;
    }

    /* ================================================================
       MISE EN PAGE PRINCIPALE : sidebar fixe + contenu scrollable
       ================================================================ */
    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ================================================================
       SIDEBAR
       ================================================================ */
    .sidebar {
      width: var(--sidebar-width);
      min-height: 100vh;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;

      /* --- En-tête (nom de l'app) -------------------------------- */
      & .sidebar__header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1.5rem 1.25rem 1.25rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);

        & .sidebar__logo {
          width: 34px;
          height: 34px;
          background: var(--clr-primary);
          border-radius: var(--radius-sm);
          display: grid;
          place-items: center;
          font-weight: 700;
          font-size: 0.95rem;
          color: #fff;
          flex-shrink: 0;
        }

        & .sidebar__title {
          font-size: 0.9rem;
          font-weight: 600;
          color: #e2e8f0;
          letter-spacing: -0.01em;
        }
      }

      /* --- Bloc utilisateur connecté ----------------------------- */
      & .sidebar__user {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 1.125rem 1.25rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);

        & .sidebar__avatar {
          width: 34px;
          height: 34px;
          border-radius: 50%;
          background: var(--clr-primary);
          display: grid;
          place-items: center;
          font-size: 0.85rem;
          font-weight: 600;
          color: #fff;
          flex-shrink: 0;
        }

        & .sidebar__user-info {
          display: flex;
          flex-direction: column;
          min-width: 0;

          & .sidebar__username {
            font-size: 0.84rem;
            font-weight: 600;
            color: #e2e8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }

          & .sidebar__email {
            font-size: 0.72rem;
            color: var(--sidebar-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
        }
      }

      /* --- Navigation -------------------------------------------- */
      & .sidebar__nav {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 0.75rem 0.75rem 0;
        gap: 2px;
        overflow-y: auto;

        & .nav-item {
          display: flex;
          align-items: center;
          gap: 0.65rem;
          padding: 0.6rem 0.875rem;
          border-radius: var(--radius-sm);
          font-size: 0.875rem;
          font-weight: 500;
          color: var(--sidebar-text);
          text-decoration: none;
          cursor: pointer;
          transition: background var(--ease), color var(--ease);
          border: none;
          background: none;
          width: 100%;
          text-align: left;

          & svg { flex-shrink: 0; }

          &:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--sidebar-text-hover);
          }

          /* Onglet actif */
          &.is-active {
            background: var(--sidebar-active-bg);
            color: var(--sidebar-active-txt);
          }

          /* Bouton déconnexion (tout en bas) */
          &.nav-item--logout {
            margin-top: auto;
            color: #f87171;

            &:hover {
              background: rgba(239, 68, 68, 0.10);
              color: #ef4444;
            }
          }
        }

        /* Spacer pour pousser "Déconnexion" en bas */
        & .nav-spacer {
          flex: 1;
          min-height: 1rem;
        }
      }
    }

    /* ================================================================
       CONTENU PRINCIPAL
       ================================================================ */
    .main {
      margin-left: var(--sidebar-width);
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;

      /* --- En-tête de page --------------------------------------- */
      & .main-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1.75rem 2rem 0;

        & h1 {
          font-size: 1.4rem;
          font-weight: 700;
          letter-spacing: -0.02em;
        }
      }

      /* --- Zone de contenu --------------------------------------- */
      & .main-body {
        padding: 1.5rem 2rem 2.5rem;
        flex: 1;
      }
    }

    /* ================================================================
       CARTE GÉNÉRIQUE (conteneur blanc avec ombre)
       ================================================================ */
    .card {
      background: var(--clr-card-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--clr-border);
      overflow: hidden;
    }

    /* ================================================================
       WELCOME CARD (page d'accueil par défaut)
       ================================================================ */
    .welcome-card {
      padding: 2rem;
      margin-bottom: 1.5rem;

      & h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.4rem;
      }

      & p {
        font-size: 0.9rem;
        color: var(--clr-muted);
      }
    }

    /* Grille de cartes de navigation rapide */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;

      & .quick-card {
        padding: 1.25rem 1.5rem;
        border-radius: var(--radius);
        cursor: pointer;
        border: 1px solid var(--clr-border);
        background: var(--clr-card-bg);
        transition: box-shadow var(--ease), border-color var(--ease), transform var(--ease);
        text-align: left;

        &:hover {
          border-color: var(--clr-primary);
          box-shadow: 0 4px 12px rgba(37, 99, 235, 0.12);
          transform: translateY(-1px);
        }

        & .quick-card__icon {
          width: 38px;
          height: 38px;
          border-radius: var(--radius-sm);
          display: grid;
          place-items: center;
          margin-bottom: 0.875rem;
          font-size: 1rem;
        }

        & .quick-card__title {
          font-size: 0.9rem;
          font-weight: 600;
          margin-bottom: 0.2rem;
        }

        & .quick-card__desc {
          font-size: 0.78rem;
          color: var(--clr-muted);
        }
      }
    }

    /* ================================================================
       BARRE D'ACTIONS (au-dessus du tableau)
       ================================================================ */
    .section-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.125rem 1.25rem;
      border-bottom: 1px solid var(--clr-border);

      & .section-count {
        font-size: 0.84rem;
        color: var(--clr-muted);
      }
    }

    /* ================================================================
       TABLEAU DE DONNÉES
       ================================================================ */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;

      & thead {
        & th {
          text-align: left;
          padding: 0.75rem 1rem;
          font-size: 0.75rem;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 0.04em;
          color: var(--clr-muted);
          background: var(--clr-table-head-bg);
          border-bottom: 1px solid var(--clr-border);
          white-space: nowrap;
        }
      }

      & tbody {
        & tr {
          border-bottom: 1px solid var(--clr-border);
          transition: background var(--ease);

          &:last-child { border-bottom: none; }

          &:hover { background: #f8fafc; }
        }

        & td {
          padding: 0.875rem 1rem;
          vertical-align: middle;
          max-width: 220px;

          /* Tronquer le texte long dans les cellules */
          &.td-truncate {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
          }
        }
      }

      /* Colonne Actions (boutons Edit/Delete) */
      & .td-actions {
        white-space: nowrap;
        text-align: right;
        width: 1%;

        & .btn-icon {
          width: 32px;
          height: 32px;
          border: none;
          border-radius: var(--radius-sm);
          cursor: pointer;
          display: inline-grid;
          place-items: center;
          transition: background var(--ease), color var(--ease);

          &.btn-edit {
            background: #f1f5f9;
            color: var(--clr-muted);
            &:hover { background: var(--clr-primary-light); color: var(--clr-primary); }
          }

          &.btn-delete {
            background: #fef2f2;
            color: #fca5a5;
            margin-left: 4px;
            &:hover { background: var(--clr-danger-light); color: var(--clr-danger); }
          }
        }
      }
    }

    /* Cellule "pourcentage" avec mini-barre visuelle */
    .progress-cell {
      display: flex;
      align-items: center;
      gap: 0.6rem;

      & .progress-bar {
        flex: 1;
        max-width: 100px;
        height: 6px;
        background: #e2e8f0;
        border-radius: 99px;
        overflow: hidden;

        & .progress-bar__fill {
          height: 100%;
          background: var(--clr-primary);
          border-radius: 99px;
        }
      }

      & .progress-value {
        font-size: 0.8rem;
        color: var(--clr-muted);
        white-space: nowrap;
      }
    }

    /* Message "aucune donnée" */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--clr-muted);

      & p {
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }
    }

    /* Spinner de chargement de la section */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 3rem 1rem;
      color: var(--clr-muted);
      font-size: 0.875rem;

      & .spin {
        width: 18px;
        height: 18px;
        border: 2px solid var(--clr-border);
        border-top-color: var(--clr-primary);
        border-radius: 50%;
        animation: spin 0.65s linear infinite;
      }
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ================================================================
       BOUTONS GÉNÉRIQUES
       ================================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0 1rem;
      height: 36px;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background var(--ease), opacity var(--ease);

      &:disabled { opacity: 0.6; cursor: not-allowed; }

      &.btn--primary {
        background: var(--clr-primary);
        color: #fff;
        &:hover:not(:disabled) { background: #1d4ed8; }
      }

      &.btn--ghost {
        background: transparent;
        color: var(--clr-muted);
        border: 1px solid var(--clr-border);
        &:hover:not(:disabled) { background: #f1f5f9; }
      }

      &.btn--danger {
        background: var(--clr-danger);
        color: #fff;
        &:hover:not(:disabled) { background: #dc2626; }
      }
    }

    /* ================================================================
       MODAL
       ================================================================ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
      animation: fade-in 0.15s ease;

      &[hidden] { display: none; }

      & .modal {
        background: var(--clr-card-bg);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-lg);
        width: 100%;
        max-width: 520px;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        animation: modal-in 0.2s ease;

        & .modal__header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 1.25rem 1.5rem;
          border-bottom: 1px solid var(--clr-border);

          & h2 {
            font-size: 1rem;
            font-weight: 600;
          }

          & .modal__close {
            width: 30px;
            height: 30px;
            background: none;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.25rem;
            line-height: 1;
            color: var(--clr-muted);
            display: grid;
            place-items: center;
            transition: background var(--ease);
            &:hover { background: #f1f5f9; color: var(--clr-dark); }
          }
        }

        & .modal__body {
          flex: 1;
          overflow-y: auto;
          padding: 1.5rem;
          display: flex;
          flex-direction: column;
          gap: 1rem;
        }

        & .modal__footer {
          display: flex;
          align-items: center;
          justify-content: flex-end;
          gap: 0.625rem;
          padding: 1rem 1.5rem;
          border-top: 1px solid var(--clr-border);
        }
      }
    }

    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(-12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)     scale(1);    }
    }

    /* ================================================================
       CHAMPS DU MODAL
       ================================================================ */
    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;

      & label {
        font-size: 0.83rem;
        font-weight: 500;
        color: var(--clr-dark);

        & .required {
          color: var(--clr-danger);
          margin-left: 2px;
        }
      }

      & input,
      & select,
      & textarea {
        font-family: var(--font);
        font-size: 0.875rem;
        color: var(--clr-dark);
        border: 1.5px solid var(--clr-border);
        border-radius: var(--radius-sm);
        padding: 0.55rem 0.75rem;
        outline: none;
        background: #fff;
        transition: border-color var(--ease), box-shadow var(--ease);

        &::placeholder { color: #c0ccd8; }

        &:focus {
          border-color: var(--clr-primary);
          box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.10);
        }
      }

      & textarea {
        resize: vertical;
        min-height: 90px;
      }
    }

    /* ================================================================
       TOASTS (notifications flottantes en haut à droite)
       ================================================================ */
    .toast-zone {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      z-index: 300;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;

      & .toast {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        padding: 0.75rem 1rem;
        border-radius: var(--radius);
        box-shadow: var(--shadow-md);
        font-size: 0.875rem;
        font-weight: 500;
        min-width: 240px;
        max-width: 360px;
        pointer-events: all;
        animation: toast-in 0.25s ease;

        &.toast--success {
          background: #ecfdf5;
          color: #065f46;
          border: 1px solid #a7f3d0;
        }

        &.toast--error {
          background: #fef2f2;
          color: #991b1b;
          border: 1px solid #fca5a5;
        }
      }
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateX(16px); }
      to   { opacity: 1; transform: translateX(0);    }
    }

    /* ================================================================
       BADGE DIFFICULTÉ (projets)
       ================================================================ */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0.2rem 0.6rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 500;

      &.badge--easy   { background: #ecfdf5; color: #065f46; }
      &.badge--medium { background: #fffbeb; color: #92400e; }
      &.badge--hard   { background: #fff7ed; color: #9a3412; }
      &.badge--expert { background: #fef2f2; color: #991b1b; }
    }

    /* ================================================================
       LIEN EXTERNE (projets — colonne Lien)
       ================================================================ */
    .ext-link {
      color: var(--clr-primary);
      font-size: 0.8rem;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;

      &:hover { text-decoration: underline; }
    }
  </style>
</head>
<body>

  <div class="app">

    <!-- ================================================================
         SIDEBAR
         ================================================================ -->
    <aside class="sidebar" id="sidebar">

      <div class="sidebar__header">
        <div class="sidebar__logo">A</div>
        <span class="sidebar__title">Admin Dashboard</span>
      </div>

      <!-- Infos utilisateur connecté (remplies par JS via /api/auth/me) -->
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="user-avatar">A</div>
        <div class="sidebar__user-info">
          <span class="sidebar__username" id="user-username">Chargement…</span>
          <span class="sidebar__email"    id="user-email"></span>
        </div>
      </div>

      <nav class="sidebar__nav" id="sidebar-nav">

        <button class="nav-item is-active" data-section="informations">
          <!-- icône personne -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Informations
        </button>

        <button class="nav-item" data-section="formations">
          <!-- icône graduation cap -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
          </svg>
          Formations
        </button>

        <button class="nav-item" data-section="competences">
          <!-- icône éclair -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
          Compétences
        </button>

        <button class="nav-item" data-section="projets">
          <!-- icône dossier -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>
          </svg>
          Projets
        </button>

        <button class="nav-item" data-section="experiences">
          <!-- icône mallette -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          Expériences
        </button>

        <div class="nav-spacer"></div>

        <button class="nav-item nav-item--logout" id="btn-logout">
          <!-- icône déconnexion -->
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
          </svg>
          Déconnexion
        </button>

      </nav>
    </aside>

    <!-- ================================================================
         CONTENU PRINCIPAL
         ================================================================ -->
    <main class="main" id="main">

      <header class="main-header">
        <h1 id="page-title">Tableau de Bord</h1>
        <!-- Le bouton "+ Ajouter" est affiché/masqué selon la section active -->
        <button class="btn btn--primary" id="btn-add" hidden>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
          </svg>
          Ajouter
        </button>
      </header>

      <div class="main-body" id="main-body">
        <!-- Contenu initial : accueil — remplacé lors de la navigation -->
        <div class="card welcome-card">
          <h2>Bienvenue dans votre espace !</h2>
          <p>Gérez et mettez à jour votre portfolio ci-dessous.</p>
          <div class="quick-grid" id="quick-grid">
            <!-- Cartes de navigation rapide générées par JS -->
          </div>
        </div>
      </div>

    </main>

  </div>

  <!-- ================================================================
       MODAL (masqué par défaut via l'attribut hidden)
       ================================================================ -->
  <div class="modal-backdrop" id="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal__header">
        <h2 id="modal-title">Formulaire</h2>
        <button class="modal__close" id="modal-close" aria-label="Fermer le modal">×</button>
      </div>
      <!-- Les champs sont générés dynamiquement par buildModalFields() -->
      <form class="modal__body" id="modal-form" novalidate></form>
      <div class="modal__footer">
        <button type="button" class="btn btn--ghost" id="modal-cancel">Annuler</button>
        <button type="submit" form="modal-form" class="btn btn--primary" id="modal-submit">Enregistrer</button>
      </div>
    </div>
  </div>

  <!-- ================================================================
       ZONE DE TOASTS
       ================================================================ -->
  <div class="toast-zone" id="toast-zone" aria-live="polite"></div>


  <script>
    /* ================================================================
       1. CONFIG
       Adapter API_BASE selon l'environnement :
         Apache XAMPP à la racine    : '/api'
         Apache dans un sous-dossier : '/portfolio/api'
         PHP built-in (port 8000)    : 'http://localhost:8000'
       ================================================================ */
    const API_BASE = '/api';

    /* ================================================================
       2. ÉTAT GLOBAL DE L'APPLICATION
       Centralisé pour faciliter la lecture et les mises à jour.
       ================================================================ */
    const state = {
      currentSection: null,  // clé de SECTIONS actuellement affichée
      editingId:      null,  // ID de l'enregistrement en cours d'édition (null = création)
      categories:     [],    // cache des catégories de compétences (évite des requêtes répétées)
    };

    /* ================================================================
       3. SCHÉMA DES SECTIONS
       Chaque section décrit :
         - apiPath  : chemin API (relatif à API_BASE)
         - label    : titre affiché dans le dashboard
         - icon     : couleur de l'icône de la quick-card
         - columns  : colonnes du tableau → { key, label, render? }
         - fields   : champs du formulaire modal → { name, label, type, required?, ... }
       ================================================================ */
    const SECTIONS = {

      informations: {
        label:   'Informations Personnelles',
        apiPath: '/informations',
        icon:    '#dbeafe',
        columns: [
          { key: 'nom',         label: 'Nom'         },
          { key: 'prenom',      label: 'Prénom'      },
          { key: 'telephone',   label: 'Téléphone'   },
          { key: 'description', label: 'Description', truncate: true },
        ],
        fields: [
          { name: 'nom',         label: 'Nom',         type: 'text',     required: true  },
          { name: 'prenom',      label: 'Prénom',      type: 'text',     required: true  },
          { name: 'telephone',   label: 'Téléphone',   type: 'tel',      required: false },
          { name: 'description', label: 'Description', type: 'textarea', required: true  },
          { name: 'avatar',      label: 'URL Avatar',  type: 'url',      required: false },
        ],
      },

      formations: {
        label:   'Formations',
        apiPath: '/scolarite',
        icon:    '#dcfce7',
        columns: [
          { key: 'intitule',      label: 'Intitulé'      },
          { key: 'niveau',        label: 'Niveau'        },
          { key: 'etablissement', label: 'Établissement' },
          { key: 'ville',         label: 'Ville'         },
          { key: 'date_debut',    label: 'Début'         },
          { key: 'date_fin',      label: 'Fin', render: v => v ?? '—' },
        ],
        fields: [
          { name: 'intitule',      label: 'Intitulé',      type: 'text',     required: true,  placeholder: 'ex : BTS SIO, BUT Informatique…' },
          { name: 'niveau',        label: 'Niveau',        type: 'text',     required: true,  placeholder: 'ex : BAC+2, BAC+3…' },
          { name: 'etablissement', label: 'Établissement', type: 'text',     required: true  },
          { name: 'ville',         label: 'Ville',         type: 'text',     required: true  },
          { name: 'description',   label: 'Description',   type: 'textarea', required: false },
          { name: 'date_debut',    label: 'Date de début', type: 'date',     required: true  },
          { name: 'date_fin',      label: 'Date de fin',   type: 'date',     required: false },
        ],
      },

      competences: {
        label:   'Compétences',
        apiPath: '/competences',
        icon:    '#fef9c3',
        columns: [
          /* categorie_nom est ajouté par enrichissement JS (cf. loadSection) */
          { key: 'categorie_nom', label: 'Catégorie' },
          {
            key: 'pourcentage',
            label: 'Niveau',
            render: v => v != null
              ? `<div class="progress-cell">
                   <div class="progress-bar"><div class="progress-bar__fill" style="width:${v}%"></div></div>
                   <span class="progress-value">${v} %</span>
                 </div>`
              : '—',
          },
        ],
        fields: [
          /* Le select catégorie est peuplé dynamiquement par buildModalFields() */
          { name: 'categorie_id', label: 'Catégorie', type: 'select-categories', required: true  },
          { name: 'pourcentage',  label: 'Pourcentage (0–100)', type: 'number', min: 0, max: 100, required: false },
        ],
      },

      projets: {
        label:   'Projets',
        apiPath: '/projets',
        icon:    '#ede9fe',
        columns: [
          { key: 'titre',      label: 'Titre'     },
          { key: 'difficulte', label: 'Difficulté',
            render: v => {
              if (!v) return '—';
              const map = { Facile: 'easy', Moyen: 'medium', Difficile: 'hard', Avancé: 'expert' };
              return `<span class="badge badge--${map[v] ?? 'easy'}">${v}</span>`;
            }
          },
          { key: 'lien',       label: 'Lien',
            render: v => v
              ? `<a class="ext-link" href="${escapeHtml(v)}" target="_blank" rel="noopener">
                   Voir
                   <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                     <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                   </svg>
                 </a>`
              : '—',
          },
          { key: 'date_debut', label: 'Début' },
          { key: 'date_fin',   label: 'Fin', render: v => v ?? '—' },
        ],
        fields: [
          { name: 'titre',             label: 'Titre',            type: 'text',     required: true  },
          { name: 'description',       label: 'Description',      type: 'textarea', required: true  },
          { name: 'image_description', label: 'Image (URL)',       type: 'url',      required: false },
          { name: 'difficulte',        label: 'Difficulté',        type: 'select',   required: false,
            options: ['', 'Facile', 'Moyen', 'Difficile', 'Avancé'] },
          { name: 'lien',              label: 'Lien GitHub / Démo', type: 'url',    required: false },
          { name: 'date_debut',        label: 'Date de début',    type: 'date',     required: true  },
          { name: 'date_fin',          label: 'Date de fin',      type: 'date',     required: false },
        ],
      },

      experiences: {
        label:   'Expériences Professionnelles',
        apiPath: '/experiences',
        icon:    '#fee2e2',
        columns: [
          { key: 'intitule',     label: 'Intitulé'   },
          { key: 'entreprise',   label: 'Entreprise' },
          { key: 'ville',        label: 'Ville'      },
          { key: 'type_contrat', label: 'Contrat', render: v => v ?? '—' },
          { key: 'date_debut',   label: 'Début'      },
          { key: 'date_fin',     label: 'Fin', render: v => v ?? '—' },
        ],
        fields: [
          { name: 'intitule',     label: 'Intitulé du poste', type: 'text',     required: true  },
          { name: 'entreprise',   label: 'Entreprise',        type: 'text',     required: true  },
          { name: 'ville',        label: 'Ville',             type: 'text',     required: true  },
          { name: 'description',  label: 'Description',       type: 'textarea', required: false },
          { name: 'type_contrat', label: 'Type de contrat',   type: 'select',   required: false,
            options: ['', 'CDI', 'CDD', 'Stage', 'Alternance', 'Freelance', 'Intérim'] },
          { name: 'date_debut',   label: 'Date de début',     type: 'date',     required: true  },
          { name: 'date_fin',     label: 'Date de fin',       type: 'date',     required: false },
        ],
      },

    }; // fin SECTIONS

    /* ================================================================
       4. UTILITAIRE API
       Wrapper autour de fetch() qui :
         - envoie le cookie jwt_token automatiquement (credentials: include)
         - parse la réponse JSON
         - lance une Error si success === false ou status >= 400
       ================================================================ */
    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        credentials: 'include', // envoie le cookie jwt_token sans manipulation JS
        headers: {
          'Content-Type': 'application/json',
          ...options.headers,
        },
        ...options,
      });

      const data = await res.json();

      if (!res.ok || data.success === false) {
        throw new Error(data.message ?? `Erreur ${res.status}`);
      }

      return data.data; // on retourne directement le payload utile
    }

    /* ================================================================
       5. TOASTS — notifications temporaires (3 s)
       type : 'success' | 'error'
       ================================================================ */
    function showToast(message, type = 'success') {
      const zone  = document.getElementById('toast-zone');
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;

      const icon = type === 'success'
        ? `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
           </svg>`
        : `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
             <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
           </svg>`;

      toast.innerHTML = `${icon}<span>${escapeHtml(message)}</span>`;
      zone.appendChild(toast);

      // Suppression automatique après 3 secondes
      setTimeout(() => toast.remove(), 3000);
    }

    /* ================================================================
       6. HELPER SÉCURITÉ
       Échappe les caractères HTML pour éviter les injections XSS
       lors de l'affichage de données provenant de l'API.
       ================================================================ */
    function escapeHtml(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /* ================================================================
       7. MODAL — affichage et fermeture
       ================================================================ */
    const modalBackdrop = document.getElementById('modal-backdrop');
    const modalTitle    = document.getElementById('modal-title');
    const modalForm     = document.getElementById('modal-form');
    const modalSubmit   = document.getElementById('modal-submit');

    /** Ouvre le modal avec les champs de la section donnée.
     *  @param {string} sectionKey  - clé dans SECTIONS
     *  @param {object} data        - données à pré-remplir (édition) ou {} (création)
     */
    function openModal(sectionKey, data = {}) {
      const section = SECTIONS[sectionKey];
      state.editingId = data.id ?? null;

      // Titre dynamique selon le mode
      modalTitle.textContent = state.editingId
        ? `Modifier — ${section.label}`
        : `Ajouter — ${section.label}`;

      // Génération des champs HTML
      modalForm.innerHTML = buildModalFields(section.fields, data);

      modalBackdrop.removeAttribute('hidden');
      // Focus sur le premier champ pour l'accessibilité
      modalForm.querySelector('input, select, textarea')?.focus();
    }

    function closeModal() {
      modalBackdrop.setAttribute('hidden', '');
      state.editingId = null;
    }

    /** Génère le HTML des champs du formulaire modal.
     *  Supporte : text, tel, email, url, number, date, textarea, select, select-categories
     */
    function buildModalFields(fields, data) {
      return fields.map(f => {
        const value = data[f.name] ?? '';
        const req   = f.required ? '<span class="required">*</span>' : '';
        let input   = '';

        if (f.type === 'textarea') {
          input = `<textarea id="f-${f.name}" name="${f.name}" ${f.required ? 'required' : ''}
                             placeholder="${escapeHtml(f.placeholder ?? '')}"
                   >${escapeHtml(value)}</textarea>`;

        } else if (f.type === 'select') {
          /* Liste d'options statiques (ex : type_contrat, difficulte) */
          const opts = (f.options ?? []).map(o =>
            `<option value="${escapeHtml(o)}" ${o === value ? 'selected' : ''}>${o || '— choisir —'}</option>`
          ).join('');
          input = `<select id="f-${f.name}" name="${f.name}" ${f.required ? 'required' : ''}>${opts}</select>`;

        } else if (f.type === 'select-categories') {
          /* Liste d'options dynamiques : catégories chargées depuis l'API */
          const opts = state.categories.map(c =>
            `<option value="${c.id}" ${c.id == value ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
          ).join('');
          input = `<select id="f-${f.name}" name="${f.name}" required>
                     <option value="">— choisir une catégorie —</option>
                     ${opts}
                   </select>`;

        } else {
          /* Tous les autres types HTML natifs : text, date, number, url, tel… */
          const extra = f.min != null ? `min="${f.min}"` : '';
          const extra2 = f.max != null ? `max="${f.max}"` : '';
          input = `<input
                     type="${f.type}"
                     id="f-${f.name}"
                     name="${f.name}"
                     value="${escapeHtml(value)}"
                     placeholder="${escapeHtml(f.placeholder ?? '')}"
                     ${f.required ? 'required' : ''}
                     ${extra} ${extra2}
                   />`;
        }

        return `<div class="modal-field">
                  <label for="f-${f.name}">${escapeHtml(f.label)} ${req}</label>
                  ${input}
                </div>`;
      }).join('');
    }

    /* ================================================================
       8. RENDU DU TABLEAU
       Construit le HTML d'un tableau à partir d'une section et de ses données.
       ================================================================ */
    function renderTable(sectionKey, records) {
      const section  = SECTIONS[sectionKey];
      const mainBody = document.getElementById('main-body');

      if (records.length === 0) {
        mainBody.innerHTML = `
          <div class="card">
            <div class="section-toolbar">
              <span class="section-count">0 enregistrement</span>
            </div>
            <div class="empty-state">
              <svg width="32" height="32" fill="none" stroke="#cbd5e1" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
              </svg>
              <p>Aucune donnée pour le moment.<br/>Cliquez sur <strong>Ajouter</strong> pour créer un premier enregistrement.</p>
            </div>
          </div>`;
        return;
      }

      /* En-têtes du tableau */
      const thead = section.columns.map(c =>
        `<th>${escapeHtml(c.label)}</th>`
      ).join('') + '<th></th>'; /* colonne Actions */

      /* Lignes du tableau */
      const tbody = records.map(row => {
        const cells = section.columns.map(col => {
          const rawValue = row[col.key];
          /* Si une fonction render est définie, on l'utilise pour formater la cellule.
             Sinon, on échappe simplement la valeur pour prévenir les XSS. */
          const rendered = col.render
            ? col.render(rawValue)
            : `<span ${col.truncate ? 'title="' + escapeHtml(rawValue) + '"' : ''}>${escapeHtml(rawValue ?? '—')}</span>`;

          return `<td class="${col.truncate ? 'td-truncate' : ''}">${rendered}</td>`;
        }).join('');

        const actions = `
          <td class="td-actions">
            <button class="btn-icon btn-edit" data-id="${row.id}" aria-label="Modifier">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
              </svg>
            </button>
            <button class="btn-icon btn-delete" data-id="${row.id}" aria-label="Supprimer">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </td>`;

        return `<tr>${cells}${actions}</tr>`;
      }).join('');

      mainBody.innerHTML = `
        <div class="card">
          <div class="section-toolbar">
            <span class="section-count">${records.length} enregistrement${records.length > 1 ? 's' : ''}</span>
          </div>
          <div style="overflow-x: auto;">
            <table class="data-table">
              <thead><tr>${thead}</tr></thead>
              <tbody>${tbody}</tbody>
            </table>
          </div>
        </div>`;

      /* Attache les événements Edit et Delete sur chaque ligne */
      mainBody.querySelectorAll('.btn-edit').forEach(btn => {
        btn.addEventListener('click', () => handleEdit(sectionKey, parseInt(btn.dataset.id), records));
      });

      mainBody.querySelectorAll('.btn-delete').forEach(btn => {
        btn.addEventListener('click', () => handleDelete(sectionKey, parseInt(btn.dataset.id)));
      });
    }

    /* ================================================================
       9. CHARGEMENT D'UNE SECTION
       Affiche le spinner, interroge l'API, puis rend le tableau.
       Pour les compétences, charge aussi les catégories (pour le select).
       ================================================================ */
    async function loadSection(sectionKey) {
      const section  = SECTIONS[sectionKey];
      const mainBody = document.getElementById('main-body');

      // Mise à jour de l'en-tête de page
      document.getElementById('page-title').textContent = section.label;

      // Affichage du bouton "+ Ajouter"
      const btnAdd = document.getElementById('btn-add');
      btnAdd.removeAttribute('hidden');

      // Spinner pendant le chargement
      mainBody.innerHTML = `
        <div class="card">
          <div class="loading-state">
            <div class="spin"></div>
            Chargement des données…
          </div>
        </div>`;

      try {
        /* Pour les compétences : on charge les catégories une seule fois
           et on les met en cache dans state.categories */
        if (sectionKey === 'competences' && state.categories.length === 0) {
          state.categories = await apiFetch('/categorie-competences');
        }

        const records = await apiFetch(section.apiPath);

        /* Enrichissement des compétences : ajouter le nom de catégorie
           pour l'affichage dans le tableau (l'API ne retourne que categorie_id) */
        if (sectionKey === 'competences') {
          records.forEach(r => {
            const cat = state.categories.find(c => c.id == r.categorie_id);
            r.categorie_nom = cat?.name ?? `Catégorie #${r.categorie_id}`;
          });
        }

        renderTable(sectionKey, records);

      } catch (err) {
        mainBody.innerHTML = `
          <div class="card">
            <div class="empty-state">
              <p>Erreur lors du chargement : ${escapeHtml(err.message)}</p>
            </div>
          </div>`;
        console.error(`[Dashboard] Erreur chargement ${sectionKey} :`, err);
      }
    }

    /* ================================================================
       10. ACTIONS CRUD
       ================================================================ */

    /** Ouvre le modal en mode édition, pré-rempli avec les données de la ligne. */
    function handleEdit(sectionKey, id, records) {
      const record = records.find(r => r.id === id);
      if (!record) return;
      openModal(sectionKey, record);
    }

    /** Demande confirmation puis supprime l'enregistrement via DELETE. */
    async function handleDelete(sectionKey, id) {
      if (!confirm('Supprimer cet enregistrement ? Cette action est irréversible.')) return;

      try {
        await apiFetch(`${SECTIONS[sectionKey].apiPath}/${id}`, { method: 'DELETE' });
        showToast('Enregistrement supprimé.');
        loadSection(sectionKey); // rechargement du tableau
      } catch (err) {
        showToast(`Erreur : ${err.message}`, 'error');
      }
    }

    /** Soumet le formulaire modal (création ou mise à jour selon state.editingId). */
    async function handleModalSubmit(e) {
      e.preventDefault();

      const sectionKey = state.currentSection;
      const section    = SECTIONS[sectionKey];
      const formData   = new FormData(modalForm);
      const body       = {};

      /* Conversion FormData → objet JSON
         Les champs vides sont exclus pour ne pas écraser avec null */
      formData.forEach((value, key) => {
        if (value !== '') body[key] = value;
      });

      // Conversion du pourcentage en entier si présent
      if (body.pourcentage !== undefined) {
        body.pourcentage = parseInt(body.pourcentage, 10);
      }

      // Conversion de categorie_id en entier si présent
      if (body.categorie_id !== undefined) {
        body.categorie_id = parseInt(body.categorie_id, 10);
      }

      const isEdit  = state.editingId !== null;
      const path    = isEdit
        ? `${section.apiPath}/${state.editingId}`
        : section.apiPath;
      const method  = isEdit ? 'PUT' : 'POST';

      try {
        modalSubmit.disabled = true;
        await apiFetch(path, { method, body: JSON.stringify(body) });
        showToast(isEdit ? 'Modification enregistrée.' : 'Enregistrement créé.');
        closeModal();
        loadSection(sectionKey); // actualise le tableau
      } catch (err) {
        showToast(`Erreur : ${err.message}`, 'error');
      } finally {
        modalSubmit.disabled = false;
      }
    }

    /* ================================================================
       11. NAVIGATION — changement d'onglet dans la sidebar
       ================================================================ */
    function navigateTo(sectionKey) {
      if (!SECTIONS[sectionKey]) return;

      // Mise à jour visuelle des éléments de nav (retrait/ajout de is-active)
      document.querySelectorAll('.nav-item[data-section]').forEach(el => {
        el.classList.toggle('is-active', el.dataset.section === sectionKey);
      });

      state.currentSection = sectionKey;
      loadSection(sectionKey);
    }

    /* ================================================================
       12. ACCUEIL — grille de navigation rapide
       ================================================================ */
    function renderWelcome() {
      const grid = document.getElementById('quick-grid');
      if (!grid) return;

      grid.innerHTML = Object.entries(SECTIONS).map(([key, sec]) =>
        `<button class="quick-card" data-section="${key}">
           <div class="quick-card__icon" style="background: ${sec.icon};">
             <span>→</span>
           </div>
           <div class="quick-card__title">${escapeHtml(sec.label)}</div>
           <div class="quick-card__desc">Voir et gérer</div>
         </button>`
      ).join('');

      grid.querySelectorAll('.quick-card').forEach(card => {
        card.addEventListener('click', () => navigateTo(card.dataset.section));
      });
    }

    /* ================================================================
       13. INITIALISATION
       Point d'entrée : vérifie l'auth, charge le profil, configure les events.
       ================================================================ */
    async function init() {
      /* --- Vérification de la session via /api/auth/me ---
         Si le cookie jwt_token n'est pas valide ou absent, rediriger. */
      try {
        const user = await apiFetch('/auth/me');

        // Remplissage des infos utilisateur dans la sidebar
        const initial = (user.username ?? 'A')[0].toUpperCase();
        document.getElementById('user-avatar').textContent   = initial;
        document.getElementById('user-username').textContent = user.username ?? 'Admin';
        document.getElementById('user-email').textContent    = user.email ?? '';

      } catch {
        // Token absent ou invalide → retour à la page de login
        window.location.replace('login.html');
        return;
      }

      /* --- Navigation sidebar --- */
      document.getElementById('sidebar-nav').addEventListener('click', e => {
        const item = e.target.closest('[data-section]');
        if (item) navigateTo(item.dataset.section);
      });

      /* --- Bouton "+ Ajouter" --- */
      document.getElementById('btn-add').addEventListener('click', () => {
        if (state.currentSection) openModal(state.currentSection);
      });

      /* --- Soumission du modal --- */
      modalForm.addEventListener('submit', handleModalSubmit);

      /* --- Fermeture du modal --- */
      document.getElementById('modal-close').addEventListener('click',  closeModal);
      document.getElementById('modal-cancel').addEventListener('click', closeModal);

      /* Fermeture en cliquant sur le fond grisé */
      modalBackdrop.addEventListener('click', e => {
        if (e.target === modalBackdrop) closeModal();
      });

      /* Fermeture avec Échap */
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && !modalBackdrop.hasAttribute('hidden')) closeModal();
      });

      /* --- Déconnexion --- */
      document.getElementById('btn-logout').addEventListener('click', async () => {
        try {
          await apiFetch('/auth/logout', { method: 'POST' });
        } catch {
          /* On redirige quoi qu'il arrive, même si l'appel échoue */
        }
        window.location.replace('login.html');
      });

      /* --- Rendu de la page d'accueil --- */
      renderWelcome();

      /* --- Chargement de la première section par défaut --- */
      navigateTo('informations');
    }

    // Lancement
    init();
  </script>

</body>
</html>
